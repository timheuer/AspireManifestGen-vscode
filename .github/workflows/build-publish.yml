name: Build and Publish

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths-ignore:
            - "**/*.md"
            - "**/*.gitignore"
            - "**/*.gitattributes"

jobs:
    build:
        permissions:
            contents: write
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install dependencies
              run: npm install

            - name: Install vsce
              run: npm install -g @vscode/vsce

            - name: NBGV
              uses: dotnet/nbgv@master
              id: nbgv
              with:
                  stamp: package.json

            - name: NBGV outputs
              run: |
                  echo "SimpleVersion: ${{ steps.nbgv.outputs.SimpleVersion }}"

            - name: Package
              run: |
                  vsce package -o ./${{ github.event.repository.name}}.vsix

            - name: Publish
              if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
              run: npm run deploy
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}

            - name: 🔗 Marketplace Link
              if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
              run: |
                  echo "## 🚀 Published Extension" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
                  echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
                  echo "| **Version** | ${{ steps.nbgv.outputs.SimpleVersion }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| **Marketplace** | [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=${{ steps.extension.outputs.marketplace_id }}) |" >> $GITHUB_STEP_SUMMARY

            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ steps.extension.outputs.vsix_name }}
                  path: ./*.vsix

            - name: Tag and Release
              if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
              uses: softprops/action-gh-release@v2
              with:
                  body: Release ${{ steps.nbgv.outputs.SimpleVersion }}
                  tag_name: ${{ steps.nbgv.outputs.SimpleVersion }}
                  generate_release_notes: true
                  files: ./*.vsix
